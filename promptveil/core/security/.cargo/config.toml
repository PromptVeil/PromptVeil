[build]
# Jobs will be controlled by CARGO_BUILD_JOBS environment variable
rustflags = [
    "-C", "opt-level=3",
    "-C", "target-cpu=native",
    "-C", "lto=thin",
    "-C", "codegen-units=1",
    "-C", "panic=abort"
]

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
debug = false

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = [
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "target-cpu=native"
] 