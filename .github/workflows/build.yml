name: Build Matrix

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'  # Push events to matching v*, i.e. v1.0, v20.15.10
  pull_request:
    branches: [ main ]

env:
  JULIA_VERSION: '1.6'
  PYTHON_VERSION: '3.7'
  RUST_VERSION: 'stable'

permissions:
  id-token: write  # Necessário para autenticação OIDC com PyPI

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            build_script: ./build.sh
            check_script: ./check_prereqs.sh
          - os: windows-latest
            build_script: .\build.ps1
            check_script: .\check_prereqs.ps1
          - os: macos-latest
            build_script: ./build.sh
            check_script: ./check_prereqs.sh

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Set up Julia
      uses: julia-actions/setup-julia@v1
      with:
        version: ${{ env.JULIA_VERSION }}

    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ env.RUST_VERSION }}
        override: true

    - name: Install CMake
      uses: lukka/get-cmake@latest

    - name: Check Prerequisites
      run: ${{ matrix.check_script }}
      shell: bash

    - name: Build
      run: ${{ matrix.build_script }}
      shell: bash

    - name: Run Tests
      run: |
        cd promptveil/python
        python -m pip install -e .
        python -m pytest tests/
      shell: bash

    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: promptveil-${{ matrix.os }}
        path: |
          promptveil/python/dist/
          promptveil/python/build/
          build/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: 
      name: pypi
      url: https://pypi.org/p/promptveil
    
    permissions:
      id-token: write
    
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build package
      run: |
        cd promptveil/python
        python -m build

    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: promptveil/python/dist/ 